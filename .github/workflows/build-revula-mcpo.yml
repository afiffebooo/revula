name: Build Revula MCP Images

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare lowercase image names
        id: names
        shell: bash
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "revula_image=${REGISTRY}/${OWNER_LOWER}/revula" >> "$GITHUB_OUTPUT"
          echo "revula_mcpo_image=${REGISTRY}/${OWNER_LOWER}/revula-mcpo" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Revula base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.names.outputs.revula_image }}:latest
            ${{ steps.names.outputs.revula_image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Revula MCPO image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.mcpo
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.names.outputs.revula_image }}:${{ github.sha }}
          tags: |
            ${{ steps.names.outputs.revula_mcpo_image }}:latest
            ${{ steps.names.outputs.revula_mcpo_image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
