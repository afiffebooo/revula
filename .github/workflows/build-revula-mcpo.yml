name: Build Revula Images to Docker Hub

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: afiffebooo

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Revula base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/revula:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/revula:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Revula MCPO image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.mcpo
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.DOCKERHUB_NAMESPACE }}/revula:${{ github.sha }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/revula-mcpo:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/revula-mcpo:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
